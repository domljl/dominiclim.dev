<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>Thanks for reaching out — dominiclim.dev</title>
        <!--
            EmailJS auto-reply setup (sent TO the person who submitted the form)
            ────────────────────────────────────────────────────────────────────
            1. Create a new template in EmailJS and paste this HTML
            2. Subject: Thanks for reaching out, {{from_name}} — dominiclim.dev
            3. To Email: {{from_email}}
            4. In your main contact template, open Settings → Auto-Reply
               and link this template

            Template variables used:
            - {{from_name}}
            - {{from_email}}
            - {{message}}
        -->
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f8f4d8;
            color: #1e293b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        "
    >
        <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="100%"
            style="background-color: #f8f4d8; margin: 0; padding: 0;"
        >
            <tr>
                <td align="center" style="padding: 32px 16px;">
                    <table
                        role="presentation"
                        cellpadding="0"
                        cellspacing="0"
                        border="0"
                        width="100%"
                        style="max-width: 560px; margin: 0 auto;"
                    >
                        <!-- Header -->
                        <tr>
                            <td style="padding-bottom: 20px;">
                                <p
                                    style="
                                        margin: 0 0 8px;
                                        font-size: 11px;
                                        font-weight: 600;
                                        letter-spacing: 0.2em;
                                        text-transform: uppercase;
                                        color: #64748b;
                                    "
                                >
                                    dominiclim.dev
                                </p>
                                <h1
                                    style="
                                        margin: 0;
                                        font-size: 28px;
                                        line-height: 1.2;
                                        font-weight: 600;
                                        letter-spacing: -0.02em;
                                        color: #1e293b;
                                    "
                                >
                                    Thanks for reaching out
                                </h1>
                            </td>
                        </tr>

                        <!-- Card -->
                        <tr>
                            <td
                                style="
                                    background-color: #fffef5;
                                    border: 1px solid rgba(30, 41, 59, 0.1);
                                    border-radius: 16px;
                                    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
                                    padding: 24px;
                                "
                            >
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    width="100%"
                                >
                                    <tr>
                                        <td style="padding-bottom: 20px;">
                                            <p
                                                style="
                                                    margin: 0 0 12px;
                                                    font-size: 16px;
                                                    line-height: 1.65;
                                                    color: #334155;
                                                "
                                            >
                                                Hi {{from_name}},
                                            </p>
                                            <p
                                                style="
                                                    margin: 0;
                                                    font-size: 16px;
                                                    line-height: 1.65;
                                                    color: #334155;
                                                "
                                            >
                                                I've received your message and will respond within
                                                <strong style="color: #1e293b;">3–5 business days</strong>.
                                                Thanks for getting in touch.
                                            </p>
                                        </td>
                                    </tr>

                                    <!-- Divider -->
                                    <tr>
                                        <td style="padding-bottom: 20px;">
                                            <div
                                                style="
                                                    height: 1px;
                                                    background-color: rgba(30, 41, 59, 0.1);
                                                    line-height: 1px;
                                                    font-size: 1px;
                                                "
                                            >
                                                &nbsp;
                                            </div>
                                        </td>
                                    </tr>

                                    <!-- Message copy -->
                                    <tr>
                                        <td>
                                            <p
                                                style="
                                                    margin: 0 0 10px;
                                                    font-size: 11px;
                                                    font-weight: 600;
                                                    letter-spacing: 0.16em;
                                                    text-transform: uppercase;
                                                    color: #64748b;
                                                "
                                            >
                                                Your message
                                            </p>
                                            <div
                                                style="
                                                    margin: 0;
                                                    font-size: 16px;
                                                    line-height: 1.65;
                                                    color: #334155;
                                                    white-space: pre-wrap;
                                                    word-break: break-word;
                                                "
                                            >
                                                {{message}}
                                            </div>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- Footer -->
                        <tr>
                            <td align="center" style="padding-top: 24px;">
                                <p
                                    style="
                                        margin: 0;
                                        font-size: 12px;
                                        line-height: 1.5;
                                        color: #94a3b8;
                                    "
                                >
                                    Dominic Lim ·
                                    <a
                                        href="https://www.dominiclim.dev"
                                        style="color: #f0485f; text-decoration: none;"
                                    >
                                        dominiclim.dev
                                    </a>
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
